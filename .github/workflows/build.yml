name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: docker build -t localhost/idlegame:latest .

      - name: Deploy
        run: systemctl restart idlegame
